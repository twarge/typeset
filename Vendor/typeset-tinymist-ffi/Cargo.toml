[package]
name = "typeset-tinymist-ffi"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
publish = false

[lib]
crate-type = ["staticlib"]

[dependencies]
base64 = "0.22"
# Pinned to the exact version Typst depends on so `comemo::evict` operates on the
# same (process-global) incremental cache that `typst::compile` populates.
comemo = "=0.5.1"
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
typst = { path = "../typst/crates/typst" }
typst-ide = { path = "../typst/crates/typst-ide" }
typst-kit = { path = "../typst/crates/typst-kit", features = [
    "datetime",
    "embedded-fonts",
    "scan-fonts",
    "system-downloader",
    "system-packages",
    "universe-packages",
] }
typst-layout = { path = "../typst/crates/typst-layout" }
typst-html = { path = "../typst/crates/typst-html" }
typst-pdf = { path = "../typst/crates/typst-pdf" }
typst-svg = { path = "../typst/crates/typst-svg" }
typst-syntax = { path = "../typst/crates/typst-syntax" }
